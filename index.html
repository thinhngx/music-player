<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conditional®</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #000000; }
      #app-container { outline: 1px solid rgba(255, 255, 255, 0.1); }
    }

    @media (prefers-color-scheme: light) {
      body { background: #ffffff; }
      #app-container { outline: 1px solid rgba(0, 0, 0, 0.1); }
    }

    #app-container {
      position: relative;
      width: calc(100vw - 32px);
      height: calc(100vh - 32px);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      outline-offset: -1px;
    }

    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.6s ease;
    }

    body.artwork-loaded #bg-canvas {
      opacity: 1;
    }

    #bg-blur {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      -webkit-backdrop-filter: blur(52px) brightness(0.6) saturate(1.3);
      backdrop-filter: blur(52px) brightness(0.6) saturate(1.3);
    }

    #app-container::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.22;
      mix-blend-mode: overlay;
    }

    /* ─── Weather widget ─────────────────────────── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #weather-widget {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    #weather-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }

    #weather-condition,
    #weather-location {
      font-family: 'Geist Mono', monospace;
      font-weight: 500;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
      line-height: 1;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }

    #weather-location {
      opacity: 0.5;
    }

    /* ─── Player outer wrapper ────────────────────── */
    .player-outer {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 3;
    }

    /* ─── Player Card (horizontal flex container) ─── */
    .player {
      display: flex;
      flex-direction: row;
      background: #ffffff;
      border-radius: 8px;
      outline: 1px solid rgba(0, 0, 0, 0.125);
      box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.125);
      overflow: hidden;
      user-select: none;
    }

    /* Left column — the actual player content */
    .player-content {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 16px 38px;
      transition: padding 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Mini mode overrides on the content column */
    .player.mini .player-content {
      padding: 12px 16px;
      gap: 12px;
    }

    /* ─── Full-only collapsible wrapper ───────────── */
    .full-only {
      display: grid;
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 0;
      transition:
        grid-template-rows 0.32s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.22s ease,
        margin-bottom 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .player.mini .full-only {
      grid-template-rows: 0fr;
      opacity: 0;
      margin-bottom: -12px; /* cancel mini-mode gap (12px) when collapsed */
    }

    .full-only-inner {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(0px);
      filter: blur(0px);
      transition:
        transform 0.36s cubic-bezier(0.4, 0, 0.2, 1),
        filter 0.28s ease;
    }

    .player.mini .full-only-inner {
      transform: translateY(-10px);
      filter: blur(8px);
    }

    /* ─── Album Art ───────────────────────────────── */
    .album-art {
      width: 188px;
      height: 188px;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.25s ease;
    }

    .album-art img.loading {
      opacity: 0;
    }

    /* ─── Track Info ──────────────────────────────── */
    .track-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .track-title {
      font-size: 16px;
      line-height: 20px;
      font-weight: 500;
      color: #222222;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist-wrap {
      overflow: hidden;
    }

    .track-artist {
      font-size: 12px;
      line-height: 16px;
      color: rgba(0, 0, 0, 0.5);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    /* ─── Controls ────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    /* Mini: pb-2 adds 8px below the control icons */
    .player.mini .controls {
      padding-bottom: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      color: #222222;
      transition: background 0.12s ease, color 0.12s ease;
      outline: none;
      flex-shrink: 0;
      position: relative;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .icon-btn:active {
      background: rgba(0, 0, 0, 0.10);
    }

    .icon-btn:focus-visible {
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.18);
    }

    .icon-btn svg {
      display: block;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Secondary icons — dimmed when inactive */
    .icon-btn.dimmed {
      color: rgba(34, 34, 34, 0.35);
    }

    /* Active indicator dot (shuffle) */
    .icon-btn.dot-indicator::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #222222;
    }

    /* Play / Pause primary button */
    .play-btn {
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.05);
      margin: 0 -8px;
    }

    .play-btn:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .play-btn:active {
      background: rgba(0, 0, 0, 0.14);
    }

    /* Heart liked */
    .like-btn .heart-filled {
      display: none;
    }

    .like-btn.liked .heart-outline {
      display: none;
    }

    .like-btn.liked .heart-filled {
      display: block;
    }

    /* ─── Progress ────────────────────────────────── */
    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-bar {
      height: 4px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.1);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      touch-action: none;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: #000000;
      pointer-events: none;
      will-change: width;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #000000;
      pointer-events: none;
      transition: transform 0.12s ease;
    }

    .progress-bar:hover .progress-thumb,
    .progress-bar.dragging .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-variant-numeric: tabular-nums;
    }

    .time-row span {
      font-size: 12px;
      line-height: 16px;
      color: rgba(0, 0, 0, 0.5);
    }

    /* ─── Collapse Button ─────────────────────────── */
    .collapse-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 8px 16px;
      color: rgba(0, 0, 0, 0.85);
      outline: none;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-top: -30px;
      margin-right: 0;
      transition: margin-top 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                  margin-right 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.2s ease,
                  color 0.12s ease,
                  padding 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .collapse-btn:hover {
      color: #000000;
    }

    .collapse-btn:active {
      color: rgba(0, 0, 0, 0.45);
    }

    .collapse-btn:focus-visible {
      outline: 2px solid rgba(0, 0, 0, 0.18);
      outline-offset: 3px;
    }

    /* Full player: chevron points ∧ */
    .collapse-btn svg {
      display: block;
      transform: rotate(180deg);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Mini player: black pill, 5px gap below card, white ∨ chevron */
    .player.mini ~ .collapse-btn {
      margin-top: 5px;
      background: #000000;
      color: #ffffff;
      padding: 6px 8px;
    }

    .player.mini ~ .collapse-btn:hover {
      background: rgba(0, 0, 0, 0.82);
      color: #ffffff;
    }

    .player.mini ~ .collapse-btn:active {
      background: rgba(0, 0, 0, 0.68);
      color: #ffffff;
    }

    .player.mini ~ .collapse-btn svg {
      transform: rotate(0deg);
    }

    /* When full queue is open, shift collapse btn left to stay under the 220px player-content */
    .player.queue-open ~ .collapse-btn {
      margin-right: 180px;
    }

    /* ─── Queue (mini mode) ───────────────────────── */
    .queue-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.07);
      margin: -8px -16px 0;
      display: none;
    }

    .queue-divider.visible {
      display: block;
    }

    .queue {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      filter: blur(6px);
      transform: translateY(-6px);
      transition:
        max-height 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.22s ease,
        filter 0.24s ease,
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      margin: 0 -4px;
    }

    .queue.open {
      max-height: 242px; /* 5.5 items × 44px */
      overflow-y: auto;
      opacity: 1;
      filter: blur(0px);
      transform: translateY(0px);
    }

    /* In mini mode, cancel the phantom 12px flex gap before the 0-height queue */
    .player.mini .queue {
      margin-top: -12px;
      transition:
        max-height 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.22s ease,
        filter 0.24s ease,
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        margin-top 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    .player.mini .queue:hover {
      scrollbar-color: rgba(0, 0, 0, 0.18) transparent;
    }

    .player.mini .queue::-webkit-scrollbar { width: 4px; }
    .player.mini .queue::-webkit-scrollbar-track { background: transparent; }
    .player.mini .queue::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 2px;
    }
    .player.mini .queue:hover::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.18); }

    .player.mini .queue.open {
      margin-top: 0;
    }

    /* Sticky bottom gradient for mini queue — signals more content to scroll */
    .player.mini .queue::after {
      content: '';
      display: block;
      position: sticky;
      bottom: 0;
      height: 22px;
      background: linear-gradient(to top, white, transparent);
      pointer-events: none;
      margin-top: -22px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .player.mini .queue.open::after       { opacity: 1; }
    .player.mini .queue.at-bottom::after  { opacity: 0; }

    /* Queue only usable in mini mode */
    .player:not(.mini) .queue-divider,
    .player:not(.mini) .queue {
      display: none !important;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .queue-item:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .queue-item:active {
      background: rgba(0, 0, 0, 0.08);
    }

    .queue-thumb {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .queue-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .queue-info {
      flex: 1;
      min-width: 0;
    }

    .queue-item-title {
      font-size: 13px;
      line-height: 17px;
      color: rgba(34, 34, 34, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item.current .queue-item-title {
      color: #222222;
      font-weight: 500;
    }

    .queue-item-artist {
      font-size: 11px;
      line-height: 15px;
      color: rgba(0, 0, 0, 0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Full-player Queue Panel (horizontal expansion) */
    .queue-panel {
      width: 0;
      overflow: hidden;
      flex-shrink: 0;
      position: relative; /* anchor for absolutely-positioned inner + fade */
      transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .queue-panel.open {
      width: 180px;
    }

    .player.mini .queue-panel {
      display: none;
    }

    .queue-panel-inner {
      position: absolute; /* out of flow — can't affect card height */
      top: 0;
      left: 0;
      bottom: 0;
      width: 180px;
      overflow-y: auto;
      border-left: 1px solid rgba(0, 0, 0, 0.08);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      transform: translateX(16px);
      filter: blur(8px);
      opacity: 0;
      transition:
        transform 0.30s cubic-bezier(0.4, 0, 0.2, 1),
        filter 0.25s ease,
        opacity 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    .queue-panel.open .queue-panel-inner {
      transform: translateX(0px);
      filter: blur(0px);
      opacity: 1;
    }

    .queue-panel-inner:hover {
      scrollbar-color: rgba(0, 0, 0, 0.18) transparent;
    }

    .queue-panel-inner::-webkit-scrollbar { width: 4px; }
    .queue-panel-inner::-webkit-scrollbar-track { background: transparent; }
    .queue-panel-inner::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 2px;
    }
    .queue-panel-inner:hover::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.18); }

    /* Gradient fade at bottom of full queue panel */
    .queue-panel-fade {
      position: absolute;
      bottom: 0;
      left: 1px; /* clear the border-left */
      right: 0;
      height: 40px;
      background: linear-gradient(to top, white, transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .queue-panel.open .queue-panel-fade       { opacity: 1; }
    .queue-panel.at-bottom .queue-panel-fade  { opacity: 0; }

    .queue-panel-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s ease;
      flex-shrink: 0;
    }

    .queue-panel-item:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .queue-panel-item:active {
      background: rgba(0, 0, 0, 0.08);
    }

    .queue-panel-thumb {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.1);
    }

    .queue-panel-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .queue-panel-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .queue-panel-title {
      font-size: 12px;
      line-height: 16px;
      color: #222222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-panel-item.current .queue-panel-title {
      font-weight: 500;
    }

    .queue-panel-artist {
      font-size: 12px;
      line-height: 16px;
      color: rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<div id="app-container">
<canvas id="bg-canvas"></canvas>
<div id="bg-blur"></div>
<div class="player-outer">
<div class="player" id="player">

  <!-- Left column: all player content -->
  <div class="player-content">

    <!-- Full-player-only content (album art + track info) -->
    <div class="full-only" id="full-only">
      <div class="full-only-inner">
        <div class="album-art" id="album-art">
          <img id="album-img" src="" alt="Album Art" class="loading" />
        </div>
        <div class="track-info">
          <div class="track-title" id="track-title">places to be</div>
          <div class="track-artist-wrap">
            <span class="track-artist" id="track-artist">Fred Again, Anderson Paak, CHIKA</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">

      <!-- Shuffle -->
      <button class="icon-btn dimmed" id="shuffle-btn" aria-label="Shuffle" title="Shuffle (S)">
        <svg viewBox="0 0 15 15" width="15" height="15" fill="currentColor">
          <path d="M12.354 1.146C12.158 0.951 11.842 0.951 11.646 1.146C11.451 1.342 11.451 1.658 11.646 1.854L12.793 3H12C10.704 3 9.711 3.584 8.872 4.389C8.201 5.034 7.593 5.857 6.995 6.668C6.863 6.847 6.732 7.025 6.6 7.2C5.109 9.188 3.49 11 0.5 11C0.224 11 0 11.224 0 11.5C0 11.776 0.224 12 0.5 12C4.01 12 5.891 9.812 7.4 7.8C7.544 7.608 7.683 7.42 7.82 7.235L7.82 7.234C8.417 6.427 8.961 5.691 9.565 5.111C10.289 4.416 11.046 4 12 4H12.793L11.646 5.146C11.451 5.342 11.451 5.658 11.646 5.854C11.842 6.049 12.158 6.049 12.354 5.854L14.354 3.854C14.549 3.658 14.549 3.342 14.354 3.146L12.354 1.146ZM0.5 3C3.353 3 5.13 4.446 6.505 6.067L6.376 6.243C6.248 6.416 6.123 6.586 6 6.75C5.964 6.798 5.928 6.846 5.892 6.893C4.573 5.293 3.026 4 0.5 4C0.224 4 0 3.776 0 3.5C0 3.224 0.224 3 0.5 3ZM8.872 10.611C8.373 10.131 7.909 9.553 7.458 8.955C7.647 8.717 7.827 8.481 8 8.25L8.09 8.13C8.584 8.794 9.053 9.398 9.565 9.889C10.289 10.584 11.046 11 12 11H12.793L11.646 9.854C11.451 9.658 11.451 9.342 11.646 9.146C11.842 8.951 12.158 8.951 12.354 9.146L14.354 11.146C14.549 11.342 14.549 11.658 14.354 11.854L12.354 13.854C12.158 14.049 11.842 14.049 11.646 13.854C11.451 13.658 11.451 13.342 11.646 13.146L12.793 12H12C10.704 12 9.711 11.416 8.872 10.611Z"/>
        </svg>
      </button>

      <!-- Prev -->
      <button class="icon-btn" id="prev-btn" aria-label="Previous track" title="Previous (P)">
        <svg viewBox="0 0 15 15" width="15" height="15" fill="currentColor">

<audio id="player-audio" preload="metadata" style="display:none"></audio>
<script>
  // ─── Track colors (fallback while art loads / if no art) ───
  const TRACK_COLORS = [
    '#5B7A94','#7B8E7A','#8C6D44','#6A5478','#4A7B6A',
    '#7A5444','#4A5A7B','#8A7B4A','#6A4A5A','#5A6A4A',
    '#7B5A4A','#4A6A7B','#7B4A6A'
  ];

  // ─── State ─────────────────────────────────────────
  let tracks = [];
  let audio  = null;
  let skipTo = () => {}; // stubbed until initPlayer runs

  const state = {
    index: 0,
    playing: false,
    currentTime: 0,
    shuffle: false,
    liked: false,
    mini: false,
    queueOpen: false,
    fullQueueOpen: false,
    dragging: false,
  };

  // ─── DOM Refs ──────────────────────────────────────
  const playerEl        = document.getElementById('player');
  const albumArt        = document.getElementById('album-art');
  const albumImg        = document.getElementById('album-img');
  const trackTitle      = document.getElementById('track-title');
  const trackArtist     = document.getElementById('track-artist');
  const playBtn         = document.getElementById('play-btn');
  const pauseIcon       = document.getElementById('pause-icon');
  const playIcon        = document.getElementById('play-icon');
  const prevBtn         = document.getElementById('prev-btn');
  const nextBtn         = document.getElementById('next-btn');
  const shuffleBtn      = document.getElementById('shuffle-btn');
  const likeBtn         = document.getElementById('like-btn');
  const progressBar     = document.getElementById('progress-bar');
  const progressFill    = document.getElementById('progress-fill');
  const progressThumb   = document.getElementById('progress-thumb');
  const currentTimeEl   = document.getElementById('current-time');
  const totalTimeEl     = document.getElementById('total-time');
  const collapseBtn     = document.getElementById('collapse-btn');
  const queueDivider    = document.getElementById('queue-divider');
  const queueEl         = document.getElementById('queue');
  const queuePanel      = document.getElementById('queue-panel');
  const queuePanelInner = document.getElementById('queue-panel-inner');

  // ─── Helpers ───────────────────────────────────────
  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function clamp(v, min, max) {
    return Math.min(max, Math.max(min, v));
  }

  function shuffleNext() {
    if (tracks.length <= 1) return 0;
    let next;
    do { next = Math.floor(Math.random() * tracks.length); }
    while (next === state.index);
    return next;
  }

  // ─── Render ────────────────────────────────────────
  function renderTrack() {
    const t = tracks[state.index];
    if (!t) {
      trackTitle.textContent  = 'Loading…';
      trackArtist.textContent = '';
      return;
    }
    trackTitle.textContent  = t.title;
    trackArtist.textContent = t.artist;
    totalTimeEl.textContent = fmt(t.duration);

    albumImg.classList.add('loading');
    albumArt.style.background = t.color;

    if (t.cover) {
      albumImg.src = t.cover;
      albumImg.onload  = () => albumImg.classList.remove('loading');
      albumImg.onerror = () => { albumImg.style.display = 'none'; };
      albumImg.style.display = '';
    } else {
      albumImg.style.display = 'none';
    }

    renderProgress();
    renderQueue();
    renderFullQueuePanel();
  }

  function renderProgress() {
    const t = tracks[state.index];
    if (!t) return;
    const pct = clamp((state.currentTime / t.duration) * 100, 0, 100);
    progressFill.style.width = `${pct}%`;
    progressThumb.style.left = `${pct}%`;
    currentTimeEl.textContent = fmt(state.currentTime);
  }

  function renderPlayState() {
    if (state.playing) {
      pauseIcon.style.display = '';
      playIcon.style.display  = 'none';
      playBtn.setAttribute('aria-label', 'Pause');
    } else {
      pauseIcon.style.display = 'none';
      playIcon.style.display  = '';
      playBtn.setAttribute('aria-label', 'Play');
    }
  }

  function renderQueue() {
    queueEl.innerHTML = '';
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = `queue-item${i === state.index ? ' current' : ''}`;

      const thumb = document.createElement('div');
      thumb.className = 'queue-thumb';
      thumb.style.background = t.color;
      if (t.cover) {
        const img = document.createElement('img');
        img.src = t.cover; img.alt = '';
        thumb.appendChild(img);
      }

      const info = document.createElement('div');
      info.className = 'queue-info';
      info.innerHTML = `<div class="queue-item-title">${t.title}</div><div class="queue-item-artist">${t.artist}</div>`;

      item.appendChild(thumb);
      item.appendChild(info);
      item.addEventListener('click', () => skipTo(i));
      queueEl.appendChild(item);
    });
  }

  function renderFullQueuePanel() {
    queuePanelInner.innerHTML = '';
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = `queue-panel-item${i === state.index ? ' current' : ''}`;

      const thumb = document.createElement('div');
      thumb.className = 'queue-panel-thumb';
      thumb.style.background = t.color;
      if (t.cover) {
        const img = document.createElement('img');
        img.src = t.cover; img.alt = '';
        thumb.appendChild(img);
      }

      const info = document.createElement('div');
      info.className = 'queue-panel-info';
      info.innerHTML = `<div class="queue-panel-title">${t.title}</div><div class="queue-panel-artist">${t.artist}</div>`;

      item.appendChild(thumb);
      item.appendChild(info);
      item.addEventListener('click', () => skipTo(i));
      queuePanelInner.appendChild(item);
    });
  }

  // ─── Jamendo playlist ──────────────────────────────
  const JAMENDO_ID      = 'b06bbe12';
  const PLAYLIST_KEY    = 'cp_playlist_v2';
  const HISTORY_KEY     = 'cp_history_v2';

  async function getHanoiWeatherCode() {
    try {
      const res = await fetch(
        'https://api.open-meteo.com/v1/forecast' +
        '?latitude=21.0285&longitude=105.8542' +
        '&hourly=weathercode&timezone=Asia%2FBangkok&forecast_days=1'
      );
      const d = await res.json();
      return d.hourly.weathercode[7]; // 7 AM Hanoi local time
    } catch (_) { return 3; }
  }

  // ── Edit this list to block genres from ever being queried ──
  const GENRE_BLACKLIST = ['lofi', 'ambient'];

  const WEATHER_GENRE_PRIORITY = {
    sunny:    ['happy', 'pop', 'upbeat'],
    breezy:   ['indie', 'folk', 'chill'],
    overcast: ['lofi', 'chill', 'indie'],
    foggy:    ['ambient', 'dreamy', 'atmospheric'],
    drizzle:  ['jazz', 'cafe', 'soul'],
    rainy:    ['blues', 'soul', 'rnb'],
    snowy:    ['classical', 'piano', 'neoclassical'],
    showers:  ['acoustic', 'folk', 'singer-songwriter'],
    stormy:   ['instrumental', 'post-rock', 'cinematic'],
  };

  function weatherToTags(code) {
    let key;
    if (code === 0)       key = 'sunny';
    else if (code <= 2)   key = 'breezy';
    else if (code <= 3)   key = 'overcast';
    else if (code <= 48)  key = 'foggy';
    else if (code <= 55)  key = 'drizzle';
    else if (code <= 65)  key = 'rainy';
    else if (code <= 77)  key = 'snowy';
    else if (code <= 82)  key = 'showers';
    else                  key = 'stormy';
    const options = WEATHER_GENRE_PRIORITY[key];
    return options.find(t => !GENRE_BLACKLIST.includes(t)) ?? options[0];
  }

  async function fetchJamendoTracks(tags) {
    const res = await fetch(
      'https://api.jamendo.com/v3.0/tracks/' +
      '?client_id=' + JAMENDO_ID +
      '&format=json&limit=50&audioformat=mp32&orderby=popularity_month' +
      '&tags=' + encodeURIComponent(tags) +
      '&imagesize=500'
    );
    const d = await res.json();
    return d.results || [];
  }

  function getHistory() {
    try {
      const raw = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      return raw.filter(e => e.ts > Date.now() - 7 * 86400000);
    } catch (_) { return []; }
  }

  function appendHistory(ids) {
    const updated = [...getHistory(), ...ids.map(id => ({ id, ts: Date.now() }))];
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(updated)); } catch (_) {}
  }

  async function buildPlaylist() {
    const code    = await getHanoiWeatherCode();
    const tags    = weatherToTags(code);
    const results = await fetchJamendoTracks(tags);
    const historySet = new Set(getHistory().map(e => e.id));
    const fresh = results
      .filter(t => t.audio && !historySet.has(String(t.id)))
      .sort(() => Math.random() - 0.5)
      .slice(0, 12)
      .map((t, i) => ({
        id:       String(t.id),
        title:    t.name,
        artist:   t.artist_name,
        duration: t.duration,
        cover:    t.album_image,
        url:      t.audio,
        color:    TRACK_COLORS[i % TRACK_COLORS.length],
      }));
    appendHistory(fresh.map(t => t.id));
    return fresh;
  }

  async function loadPlaylist() {
    const today = new Date().toISOString().split('T')[0];
    try {
      const cached = JSON.parse(localStorage.getItem(PLAYLIST_KEY) || 'null');
      if (cached?.date === today && cached.tracks?.length === 12) return cached.tracks;
    } catch (_) {}
    const list = await buildPlaylist();
    try { localStorage.setItem(PLAYLIST_KEY, JSON.stringify({ date: today, tracks: list })); } catch (_) {}
    return list;
  }

  // ─── Audio player ───────────────────────────────────
  async function initPlayer() {
    audio = document.getElementById('player-audio');

    skipTo = (idx) => {
      if (idx < 0 || idx >= tracks.length) return;
      state.index    = idx;
      state.currentTime = 0;
      audio.src = tracks[idx].url;
      audio.play().catch(() => {});
      renderTrack();
      renderPlayState();
    };

    trackTitle.textContent = 'Loading playlist…';
    try { tracks = await loadPlaylist(); }
    catch (_) { trackTitle.textContent = 'Could not load playlist.'; return; }

    state.index = 0;
    if (tracks[0]) audio.src = tracks[0].url;
    renderTrack();
    renderPlayState();

    audio.addEventListener('play',  () => { state.playing = true;  renderPlayState(); });
    audio.addEventListener('pause', () => { state.playing = false; renderPlayState(); });

    audio.addEventListener('loadedmetadata', () => {
      if (!isNaN(audio.duration)) {
        tracks[state.index].duration = Math.round(audio.duration);
        totalTimeEl.textContent = fmt(tracks[state.index].duration);
        renderProgress();
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (state.dragging) return;
      state.currentTime = Math.floor(audio.currentTime);
      renderProgress();
    });

    audio.addEventListener('ended', () => {
      skipTo(state.shuffle ? shuffleNext() : (state.index + 1) % tracks.length);
    });
  }

  // ─── Seek ──────────────────────────────────────────
  function seekByPct(pct) {
    pct = clamp(pct, 0, 1);
    if (!audio) return;
    const dur = tracks[state.index]?.duration || audio.duration || 0;
    const s   = pct * dur;
    audio.currentTime  = s;
    state.currentTime  = Math.floor(s);
    renderProgress();
  }

  function pctFromEvent(e) {
    const rect = progressBar.getBoundingClientRect();
    return (e.clientX - rect.left) / rect.width;
  }

  // ─── Collapse / Expand ─────────────────────────────
  function setMini(mini) {
    state.mini = mini;
    playerEl.classList.toggle('mini', mini);
    collapseBtn.setAttribute('aria-label', mini ? 'Expand to full player' : 'Collapse to mini player');
    if (!mini && state.queueOpen)     setQueueOpen(false);
    if (mini  && state.fullQueueOpen) setFullQueueOpen(false);
  }

  function updateMiniQueueFade() {
    const atBottom = queueEl.scrollTop + queueEl.clientHeight >= queueEl.scrollHeight - 2;
    queueEl.classList.toggle('at-bottom', atBottom);
  }

  function updateFullQueueFade() {
    const atBottom = queuePanelInner.scrollTop + queuePanelInner.clientHeight >= queuePanelInner.scrollHeight - 2;
    queuePanel.classList.toggle('at-bottom', atBottom);
  }

  function setQueueOpen(open) {
    state.queueOpen = open;
    queueEl.classList.toggle('open', open);
    queueDivider.classList.toggle('visible', open);
    if (open) {
      queueEl.scrollTop = 0;
      queueEl.classList.remove('at-bottom');
      updateMiniQueueFade();
      queueEl.addEventListener('scroll', updateMiniQueueFade);
    } else {
      queueEl.removeEventListener('scroll', updateMiniQueueFade);
      queueEl.classList.remove('at-bottom');
    }
  }

  function setFullQueueOpen(open) {
    state.fullQueueOpen = open;
    queuePanel.classList.toggle('open', open);
    playerEl.classList.toggle('queue-open', open);
    if (open) {
      queuePanelInner.scrollTop = 0;
      queuePanel.classList.remove('at-bottom');
      updateFullQueueFade();
      queuePanelInner.addEventListener('scroll', updateFullQueueFade);
    } else {
      queuePanelInner.removeEventListener('scroll', updateFullQueueFade);
      queuePanel.classList.remove('at-bottom');
    }
  }

  collapseBtn.addEventListener('click', () => {
    if (!state.mini && state.fullQueueOpen) {
      // Collapsing with full queue open: close panel first, then collapse
      setFullQueueOpen(false);
      setTimeout(() => setMini(true), 280);
    } else if (state.mini && state.queueOpen) {
      // Expanding with mini queue open: collapse list first,
      // album art starts expanding at 80% of the list's travel (224ms)
      setQueueOpen(false);
      setTimeout(() => setMini(false), 224);
    } else {
      setMini(!state.mini);
    }
  });

  // ─── Double-click: toggle queue ────────────────────
  document.querySelector('.player-outer').addEventListener('dblclick', (e) => {
    if (e.target.closest('button, [role="button"]')) return;
    if (state.mini) {
      setQueueOpen(!state.queueOpen);
    } else if (!e.target.closest('.queue-panel')) {
      setFullQueueOpen(!state.fullQueueOpen);
    }
  });

  // ─── Controls ──────────────────────────────────────
  playBtn.addEventListener('click', () => {
    if (!audio) return;
    audio.paused ? audio.play().catch(() => {}) : audio.pause();
  });

  nextBtn.addEventListener('click', () => {
    skipTo(state.shuffle ? shuffleNext() : (state.index + 1) % Math.max(tracks.length, 1));
  });

  prevBtn.addEventListener('click', () => {
    if (!audio) return;
    if (state.currentTime > 3) {
      audio.currentTime = 0;
    } else {
      skipTo((state.index - 1 + Math.max(tracks.length, 1)) % Math.max(tracks.length, 1));
    }
  });

  shuffleBtn.addEventListener('click', () => {
    state.shuffle = !state.shuffle;
    shuffleBtn.classList.toggle('dimmed',        !state.shuffle);
    shuffleBtn.classList.toggle('dot-indicator',  state.shuffle);
  });

  likeBtn.addEventListener('click', () => {
    state.liked = !state.liked;
    likeBtn.classList.toggle('liked', state.liked);
    likeBtn.setAttribute('aria-label', state.liked ? 'Unlike track' : 'Like track');
  });

  // ─── Progress Scrubbing ────────────────────────────
  progressBar.addEventListener('mousedown', (e) => {
    e.preventDefault();
    state.dragging = true;
    progressBar.classList.add('dragging');
    seekByPct(pctFromEvent(e));
  });

  document.addEventListener('mousemove', (e) => {
    if (state.dragging) seekByPct(pctFromEvent(e));
  });

  document.addEventListener('mouseup', () => {
    if (state.dragging) { state.dragging = false; progressBar.classList.remove('dragging'); }
  });

  progressBar.addEventListener('touchstart', (e) => {
    e.preventDefault();
    state.dragging = true;
    progressBar.classList.add('dragging');
    const r = progressBar.getBoundingClientRect();
    seekByPct((e.touches[0].clientX - r.left) / r.width);
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!state.dragging) return;
    const r = progressBar.getBoundingClientRect();
    seekByPct((e.touches[0].clientX - r.left) / r.width);
  });

  document.addEventListener('touchend', () => {
    if (state.dragging) { state.dragging = false; progressBar.classList.remove('dragging'); }
  });

  // ─── Keyboard Shortcuts ────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea')) return;
    const t = tracks[state.index];
    switch (e.code) {
      case 'Space':      e.preventDefault(); playBtn.click(); break;
      case 'ArrowRight': e.preventDefault(); if (t && audio) { const s = clamp(state.currentTime + 5, 0, t.duration); audio.currentTime = s; state.currentTime = s; renderProgress(); } break;
      case 'ArrowLeft':  e.preventDefault(); if (t && audio) { const s = clamp(state.currentTime - 5, 0, t.duration); audio.currentTime = s; state.currentTime = s; renderProgress(); } break;
      case 'KeyN':       nextBtn.click(); break;
      case 'KeyP':       prevBtn.click(); break;
      case 'KeyL':       likeBtn.click(); break;
      case 'KeyS':       shuffleBtn.click(); break;
      case 'KeyC':       collapseBtn.click(); break;
    }
  });

  // ─── Unsplash wallpaper background ─────────────────
  (function loadWallpaper() {
    // picsum.photos proxies Unsplash — CORS-safe, new image every load
    const url = `https://picsum.photos/1920/1080?t=${Date.now()}`;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      document.body.classList.add('artwork-loaded');
      if (window.bgLoadTexture) window.bgLoadTexture(img.src);
    };
    img.onerror = () => { /* fall back to solid color */ };
    img.src = url;
  })();

  // ─── Init ──────────────────────────────────────────
  renderTrack();
  renderPlayState();
  initPlayer();

  // ─── Background warp (WebGL) ─────────────────────────
  (function initBgWarp() {
    const canvas = document.getElementById('bg-canvas');
    const gl = canvas.getContext('webgl');
    if (!gl) return;

    const VS = `
      attribute vec2 a_pos;
      varying vec2 v_uv;
      void main() {
        v_uv = vec2(a_pos.x * 0.5 + 0.5, 0.5 - a_pos.y * 0.5);
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }
    `;

    const FS = `
      precision mediump float;
      uniform sampler2D u_tex;
      uniform float u_time;
      uniform vec2 u_res;
      uniform vec2 u_imgSize;
      varying vec2 v_uv;

      float hash(vec2 p) {
        p = fract(p * vec2(127.1, 311.7));
        p += dot(p, p + 19.19);
        return fract(p.x * p.y);
      }
      float vnoise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
          f.y
        );
      }
      vec2 domainWarp(vec2 uv, float t) {
        vec2 q = vec2(
          vnoise(uv * 2.3 + t * 0.07),
          vnoise(uv * 2.3 + vec2(5.2, 1.3) + t * 0.055)
        );
        vec2 r = vec2(
          vnoise(uv * 2.3 + 4.0 * q + vec2(1.7, 9.2) + t * 0.04),
          vnoise(uv * 2.3 + 4.0 * q + vec2(8.3, 2.8) + t * 0.032)
        );
        return 0.05 * r + 0.022 * q;
      }

      void main() {
        /* background-size: cover */
        float cr = u_res.x / u_res.y;
        float ir = u_imgSize.x / u_imgSize.y;
        vec2 scale = cr > ir ? vec2(1.0, ir / cr) : vec2(cr / ir, 1.0);
        vec2 baseUV = (v_uv - 0.5) * scale + 0.5;

        vec2 offset = domainWarp(v_uv * vec2(cr, 1.0), u_time);
        vec2 uv = clamp(baseUV + offset, 0.0, 1.0);

        gl_FragColor = vec4(texture2D(u_tex, uv).rgb, 1.0);
      }
    `;

    function compileShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    const uTime    = gl.getUniformLocation(prog, 'u_time');
    const uRes     = gl.getUniformLocation(prog, 'u_res');
    const uImgSize = gl.getUniformLocation(prog, 'u_imgSize');

    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    // 1×1 transparent pixel until image loads
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0,0,0,0]));

    let imgW = 1, imgH = 1, ready = false;

    window.bgLoadTexture = function(url) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
        imgW = img.naturalWidth;
        imgH = img.naturalHeight;
        ready = true;
      };
      img.src = url;
    };

    const container = document.getElementById('app-container');
    function resize() {
      canvas.width  = container.clientWidth;
      canvas.height = container.clientHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    let t = Math.random() * 60;
    function draw() {
      if (ready) {
        t += 0.004;
        gl.uniform1f(uTime, t);
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.uniform2f(uImgSize, imgW, imgH);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();

  // ─── Weather ────────────────────────────────────────
  (function initWeather() {
    const condEl = document.getElementById('weather-condition');
    const locEl  = document.getElementById('weather-location');

    function codeToLabel(code) {
      if (code === 0)  return 'sunny';
      if (code <= 1)   return 'mostly clear';
      if (code <= 2)   return 'partly cloudy';
      if (code <= 3)   return 'overcast';
      if (code <= 48)  return 'foggy';
      if (code <= 55)  return 'drizzly';
      if (code <= 65)  return 'rainy';
      if (code <= 77)  return 'snowy';
      if (code <= 82)  return 'showery';
      return 'stormy';
    }

    if (!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(async ({ coords }) => {
      const { latitude: lat, longitude: lon } = coords;
      try {
        const [geoRes, wxRes] = await Promise.all([
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, {
            headers: { 'Accept-Language': 'en-US,en' }
          }),
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode`)
        ]);
        const [geo, wx] = await Promise.all([geoRes.json(), wxRes.json()]);

        const addr    = geo.address;
        const city    = addr.city || addr.town || addr.village || addr.county || addr.state || 'Unknown';
        const country = (addr.country_code || '').toUpperCase();
        const temp    = Math.round(wx.current.temperature_2m);
        const label   = codeToLabel(wx.current.weathercode);

        condEl.textContent = `Now is ${temp}°C, ${label}. `;
        locEl.textContent  = `${city}, ${country}.`;
      } catch (_) {}
    }, () => {});
  })();

</script>
